name: smart_phone_field
version: 2.0.0
description: >-
  A professional Flutter phone-number input field with per-country live
  formatting, GPS-based country auto-detection, searchable country picker
  (240+ countries), real-time validation, and full design customisation.
repository: https://github.com/dev-mahmudulhasan/smart_phone_number_field_package
issue_tracker: https://github.com/dev-mahmudulhasan/smart_phone_number_field_package/issues
homepage: https://github.com/dev-mahmudulhasan/smart_phone_number_field_package

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  country_picker: ^2.0.20
  geolocator: ^10.1.0
  geocoding: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0